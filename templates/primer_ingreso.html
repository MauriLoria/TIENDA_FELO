<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Primer Ingreso</title>
</head>

<body>

<h2>Primer Ingreso</h2>

{% if mensaje %}
<p style="color:red;">
{{ mensaje }}
</p>
{% endif %}

<form method="post" action="/crear_acceso" autocomplete="off">

    <p>
        CUIT o DNI
    </p>

    <input
        type="text"
        name="documento"
        value="{{ documento }}"
        autocomplete="off"
        required>

    <p>
        Email
    </p>

    <input
        type="email"
        name="email"
        id="campo_email"
        autocomplete="off"
        required>

    <p>
        WhatsApp (con código de país, ej: 5492317507013)
    </p>

    <input
        type="text"
        name="whatsapp"
        id="campo_whatsapp"
        autocomplete="off"
        required>

    <p>
        Contraseña
    </p>

    <input
        type="password"
        name="password"
        required>

    <p>
        Repetir Contraseña
    </p>

    <input
        type="password"
        name="confirmar"
        required>

    <br><br>

    <button type="submit">
        Crear Acceso
    </button>

</form>

<script>
// El navegador a veces autocompleta el campo "documento" sobre el campo
// "email" cuando documento viene precargado. Forzamos a vaciar email/whatsapp
// apenas carga la página, sin importar lo que el navegador haya rellenado.
window.addEventListener("DOMContentLoaded", function(){
    document.getElementById("campo_email").value = "";
    document.getElementById("campo_whatsapp").value = "";
});

// Por si el navegador autocompleta después del DOMContentLoaded (pasa en Chrome)
window.addEventListener("load", function(){
    setTimeout(function(){
        document.getElementById("campo_email").value = "";
        document.getElementById("campo_whatsapp").value = "";
    }, 50);
});
</script>

</body>
</html>
